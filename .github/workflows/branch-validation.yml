name: Branch Workflow Validation

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop, staging]

jobs:
  validate-workflow:
    name: Validate Branch Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install colorama

      - name: Make validator executable
        run: |
          chmod +x branch-workflow-validator.py

      - name: Validate Branch Workflow (Push)
        if: github.event_name == 'push'
        run: |
          echo "🔍 Validating push to branch: ${{ github.ref_name }}"
          python branch-workflow-validator.py push --target-branch "${{ github.ref_name }}"

      - name: Validate Branch Workflow (Pull Request)
        if: github.event_name == 'pull_request'
        run: |
          echo "🔍 Validating PR from ${{ github.head_ref }} to ${{ github.base_ref }}"
          python branch-workflow-validator.py push --target-branch "${{ github.base_ref }}"

      - name: Show Workflow Status
        run: |
          echo "📊 Branch Workflow Status:"
          python branch-workflow-validator.py status

  context-info:
    name: Display Context Information
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install colorama

      - name: Display Branch Context
        run: |
          echo "🏗️ Repository Context Information:"
          echo "=================================="
          echo "Branch: ${{ github.ref_name }}"
          echo "Event: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo ""
          echo "📋 Workflow Validator Status:"
          python branch-workflow-validator.py status
