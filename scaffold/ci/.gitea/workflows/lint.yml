# Gitea Actions Lint Configuration
name: Lint

on:
  push:
    branches: [ main, develop, 'feature/*', 'fix/*', 'hotfix/*' ]
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Detectar contexto basado en la rama
      - name: Set context
        id: context
        run: |
          if [[ $GITEA_REF == 'refs/heads/main' ]]; then
            echo "CONTEXT=ENTERPRISE" >> $GITEA_ENV
          elif [[ $GITEA_REF == 'refs/heads/develop' ]]; then
            echo "CONTEXT=STANDARD" >> $GITEA_ENV
          else
            echo "CONTEXT=MINIMAL" >> $GITEA_ENV
          fi

      # Validaciones mínimas (siempre)
      - name: Python package vulnerabilities
        run: |
          pip install safety
          safety check

      - name: Node.js vulnerabilities
        if: always() && hashFiles('package.json') != ''
        run: |
          npm audit

      # Validaciones estándar (develop)
