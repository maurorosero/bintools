repos:
  # Grupo 01: Formato de archivos
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: format-trailing-whitespace
      - id: end-of-file-fixer
        name: format-end-of-file
      - id: mixed-line-ending
        name: format-mixed-line-ending
        args: [--fix=lf]
      - id: fix-byte-order-marker
        name: format-byte-order-marker

  # Grupo 02: Verificación de ejecutables
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-executables-have-shebangs
        name: exec-check-shebang
      - id: check-shebang-scripts-are-executable
        name: exec-check-executable

  # Grupo 03: Control de tamaño de archivos
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        name: size-check-large-files
        args: [--maxkb=500]

  # Grupo 04: Detección de secretos
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: sec-detect-secrets
        exclude: package.lock.json

  # Grupo 05: Validación de commits (manteniendo tu configuración actual)
  - repo: local
    hooks:
      - id: commitlint
        name: commit-validate
        entry: .githooks/commitlint-wrapper.py
        language: python
        stages: [commit-msg]

  # Grupo 06: Branch Workflow Commit Validation
  - repo: local
    hooks:
      - id: branch-workflow-commit
        name: branch-workflow-commit-validator
        entry: .githooks/branch-workflow-validator.py commit
        language: system
        stages: [pre-commit]
        pass_filenames: false
        always_run: true
        verbose: true

  # Grupo 07: Branch Workflow Push Validation
  - repo: local
    hooks:
      - id: branch-workflow-push
        name: branch-workflow-push-validator
        entry: .githooks/branch-workflow-validator.py push
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
        verbose: true
